services:
  kali-pentest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kali-mcp-pentest
    hostname: kali-pentest
    image: kali-mcp:latest

    env_file:
      - .env

    # Privilégios necessários para ferramentas de pentest (network scan, wireless, etc.)
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN

    ports:
      - "${MCP_PORT:-3000}:3000"   # MCP Server
      - "4444:4444"                # Metasploit listener
      - "8080:8080"                # Web proxy/tools

    volumes:
      - ./reports:/root/reports
      - ./scripts:/root/scripts
      - ./targets:/root/targets
      - ./wordlists:/root/wordlists
      - ./nmap-results:/root/nmap-results
      - ./config:/root/.config
      - ./skills:/root/skills
      - metasploit-db:/var/lib/postgresql

    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - TERM=xterm-256color
      - MCP_PORT=${MCP_PORT:-3000}
      - MCP_HOST=0.0.0.0
      - MCP_ADVERTISED_URL=http://kali-pentest:3000
      - OPENCLAW_GATEWAY_URL=http://openclaw:18789
      - OPENCLAW_REQUIRE_GATEWAY=true

    restart: unless-stopped
    stdin_open: true
    tty: true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: "${DOCKER_CPU_LIMIT:-4}"
          memory: ${DOCKER_MEMORY_LIMIT:-8G}
        reservations:
          cpus: "1"
          memory: 2G

    networks:
      - openclaw-net

  # Opcional: PostgreSQL dedicado para Metasploit
  postgres:
    image: postgres:16-alpine
    container_name: kali-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-msf}
      - POSTGRES_USER=${POSTGRES_USER:-msf}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-msf_password_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msf} -d ${POSTGRES_DB:-msf}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - with-postgres
    networks:
      - openclaw-net

volumes:
  metasploit-db:
    name: kali-metasploit-db
  postgres-data:
    name: kali-postgres-data

networks:
  openclaw-net:
    external: true
    name: openclaw-net
