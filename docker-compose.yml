services:
  kali-pentest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleo-kali-mcp
    hostname: cleo-kali-mcp
    image: kali-mcp:latest


    # Privilégios necessários para ferramentas de pentest (network scan, wireless, etc.)
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN

    ports:
      - "${MCP_PORT:-3000}:3000"   # MCP Server
      - "4444:4444"                # Metasploit listener
      - "8080:8080"                # Web proxy/tools

    volumes:
      - ./MCP-kali/reports:/root/reports
      - ./MCP-kali/scripts:/root/scripts
      - ./MCP-kali/targets:/root/targets
      - ./MCP-kali/wordlists:/root/wordlists
      - ./MCP-kali/nmap-results:/root/nmap-results
      - ./MCP-kali/config:/root/.config
      - ./MCP-kali/skills:/root/skills
      - metasploit-db:/var/lib/postgresql

    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - TERM=xterm-256color
      - MCP_PORT=${MCP_PORT:-3000}
      - MCP_HOST=0.0.0.0
      - MCP_ADVERTISED_URL=http://cleo-kali-mcp:3000
      - OPENCLAW_GATEWAY_URL=
      - OPENCLAW_REQUIRE_GATEWAY=false
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_DEVICE_IDENTITY_PATH=/root/.config/openclaw-device-identity.json
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-opus-20240229}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_MODEL=${KIMI_MODEL:-moonshot-v1-8k}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn}
      - LLM_FALLBACK_PROVIDER=${LLM_FALLBACK_PROVIDER:-ollama}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-}

    restart: unless-stopped
    stdin_open: true
    tty: true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: "${DOCKER_CPU_LIMIT:-4}"
          memory: ${DOCKER_MEMORY_LIMIT:-8G}
        reservations:
          cpus: "1"
          memory: 2G

    networks:
      - openclaw-net

  # Opcional: PostgreSQL dedicado para Metasploit
  postgres:
    image: postgres:16-alpine
    container_name: cleo-kali-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-msf}
      - POSTGRES_USER=${POSTGRES_USER:-msf}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-msf_password_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msf} -d ${POSTGRES_DB:-msf}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - with-postgres
    networks:
      - openclaw-net

volumes:
  metasploit-db:
    name: kali-metasploit-db
  postgres-data:
    name: kali-postgres-data

networks:
  openclaw-net:
    external: true
    name: openclaw-net
