version: "3.8"

services:
  kali-pentest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kali-mcp-pentest
    hostname: kali-pentest
    image: kali-mcp:latest

    # Privilégios necessários para algumas ferramentas de pentest
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN

    # Network mode host para acesso total à rede
    # ATENÇÃO: Use com cuidado, apenas em ambientes de teste isolados
    network_mode: "bridge"

    ports:
      - "3000:3000" # MCP Server
      - "4444:4444" # Metasploit listener
      - "8080:8080" # Web proxy/tools

    volumes:
      # Persistir reports e dados
      - ./reports:/root/reports
      - ./scripts:/root/scripts
      - ./targets:/root/targets
      - ./wordlists:/root/wordlists
      # Compartilhar resultados do nmap
      - ./nmap-results:/root/nmap-results
      # Configurações persistentes
      - ./config:/root/.config
      # Database do Metasploit
      - metasploit-db:/var/lib/postgresql

    environment:
      - TZ=America/Sao_Paulo
      - TERM=xterm-256color
      - MCP_PORT=3000
      - MCP_HOST=0.0.0.0
      # Configurações de proxy (se necessário)
      # - HTTP_PROXY=http://proxy:port
      # - HTTPS_PROXY=http://proxy:port

    # Reiniciar automaticamente
    restart: unless-stopped

    # Manter container rodando
    stdin_open: true
    tty: true

    # Healthcheck do MCP server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Limites de recursos (ajuste conforme necessário)
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

  # Opcional: PostgreSQL para Metasploit (se não usar o interno)
  postgres:
    image: postgres:15-alpine
    container_name: kali-postgres
    environment:
      - POSTGRES_DB=msf
      - POSTGRES_USER=msf
      - POSTGRES_PASSWORD=msf_password_change_me
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - with-postgres

volumes:
  metasploit-db:
    name: kali-metasploit-db
  postgres-data:
    name: kali-postgres-data

networks:
  default:
    name: kali-pentest-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
